<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HS Code Finder</title>
    
    <!-- Bootstrap CSS -->
    <link 
      rel="stylesheet" 
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      integrity="sha384-ENjdO4Dr2bkBIFxQqL6X1d3AdSHon2WpwE463Q0lm33kPSJ8nG1tpZhJBZdwZk++"
      crossorigin="anonymous"
    >
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

    <!-- Hero Section -->
    <section class="hero-section">
        <div class="container text-center">
            <h1>Find Your HS Code</h1>
            <p class="hero-description">
                Upload an image or enter a description to identify accurate HS codes instantly.
            </p>
        </div>
    </section>

    <!-- Main Content -->
    <div class="container main-content my-5">
        <div class="row g-4">
            
            <!-- Text Description -->
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header text-center">Enter Product Description</div>
                    <div class="card-body">
                        <form action="/process_description" method="POST">
                            <div class="mb-3">
                                <label for="description" class="form-label">Description:</label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="description" 
                                    name="description" 
                                    required
                                />
                            </div>
                            <button type="submit" class="btn btn-success w-100">Get HS Code</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Image Upload -->
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header text-center">Upload an Image</div>
                    <div class="card-body">
                        <form action="/process_image" method="POST" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label for="image_file" class="form-label">Choose an image:</label>
                                <input 
                                    type="file" 
                                    class="form-control" 
                                    id="image_file" 
                                    name="image_file" 
                                    accept="image/*" 
                                    required
                                />
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Get HS Code from Image</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Result Display -->
        {% if result %}
        <div class="alert alert-info result-alert text-center mt-4">
            <strong>Result:</strong> {{ result }}
        </div>
        {% endif %}
    </div>

    <!-- Bootstrap JS -->
    <script 
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-OP2KzQUFbOp+EYj7bPQuTnQ+LU4ZQGZQQ6rjGVXYDkWXUi3PSNcwHLDp4K7wkTWr"
      crossorigin="anonymous"
    ></script>
</body>
</html>
